<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<title>ChatLBZ AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
margin:0;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chatBox{
width:400px;
height:600px;
background:#1e293b;
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.header{
background:#2563eb;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.messages{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
margin-bottom:10px;
padding:10px;
border-radius:10px;
max-width:80%;
}

.user{
background:#2563eb;
margin-right:auto;
}

.ai{
background:#334155;
margin-left:auto;
}

.inputArea{
display:flex;
padding:10px;
background:#0f172a;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}

button{
margin-right:10px;
padding:10px 20px;
background:#2563eb;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="chatBox">

<div class="header">
ChatLBZ AI
</div>

<div class="messages" id="chat"></div>

<div class="inputArea">
<input id="text" placeholder="כתוב הודעה...">
<button onclick="send()">שלח</button>
</div>

</div>

<script>

const API_KEY = "PUT_YOUR_GEMINI_KEY_HERE";

function addMessage(text,type){

const chat=document.getElementById("chat");

const div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

async function send(){

const input=document.getElementById("text");
const text=input.value;

if(!text) return;

addMessage(text,"user");

input.value="";

addMessage("חושב...","ai");

try{

const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:text}
]
}
]
})
}
);

const data=await response.json();

document.querySelector(".ai:last-child").remove();

const reply=data.candidates[0].content.parts[0].text;

addMessage(reply,"ai");

}catch(e){

addMessage("שגיאה בחיבור ל-AI","ai");

}

}

</script>

</body>

</html>
